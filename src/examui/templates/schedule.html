{% extends 'base.html' %}

{% block title %}Schedule — p2e{% endblock %}

{% block head %}
<link href="https://cdn.datatables.net/2.0.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="container-fluid py-3">

  <div class="d-flex align-items-center gap-2 mb-2">
    <h5 class="mb-0 flex-shrink-0"><i class="bi bi-calendar3"></i> Schedule</h5>
    <a href="{{ url_for('history.list_students') }}" class="btn btn-sm btn-outline-secondary flex-shrink-0">
      <i class="bi bi-people"></i> History
    </a>
    <div class="form-check mb-0 flex-shrink-0">
      <input class="form-check-input" type="checkbox" id="today-filter">
      <label class="form-check-label" for="today-filter">Today only</label>
    </div>
    <select id="page-len" class="form-select form-select-sm w-auto flex-shrink-0">
      <option value="25">25</option>
      <option value="50" selected>50</option>
      <option value="-1">All</option>
    </select>
    <input id="dt-search" type="search" class="form-control form-control-sm flex-grow-1"
           placeholder="Search…" style="min-width:0;">
  </div>

  <table id="schedule-table" class="table table-sm table-hover table-striped">
    <thead>
      <tr>
        <th>Slot</th>
        <th>Name</th>
        <th>Mark</th>
        <th>Tests</th>
        <th>Javadoc</th>
        <th>Cyclic</th>
        <th class="text-end">Code</th>
        <th class="text-end">Docs</th>
        <th class="text-end">Files</th>
        <th class="text-end">Past</th>
      </tr>
    </thead>
  </table>

</div>
{% endblock %}

{% block scripts %}
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.min.js"></script>
<script>
const CFG = {
  rows:  {{ rows_json | safe }},
  today: {{ today | tojson }},
};
</script>
<script src="{{ url_for('static', filename='schedule.js') }}"></script>
{% endblock %}
