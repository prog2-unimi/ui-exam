{% extends 'base.html' %}

{% block title %}History — p2e{% endblock %}

{% block head %}
<link href="https://cdn.datatables.net/2.0.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="container-fluid py-3">

  <div class="d-flex align-items-center gap-3 mb-3">
    <h5 class="mb-0"><i class="bi bi-people"></i> Students</h5>
    <select id="date-filter" class="form-select form-select-sm w-auto">
      <option value="">All exam dates</option>
      {% for date in exam_dates %}
      <option value="{{ date }}" {% if date == exam_date %}selected{% endif %}>
        {{ date[:2] }}-{{ date[2:4] }}-{{ date[4:] }}
      </option>
      {% endfor %}
    </select>
    <div class="form-check mb-0">
      <input class="form-check-input" type="checkbox" id="refused-filter">
      <label class="form-check-label" for="refused-filter">Has ~</label>
    </div>
    <div class="form-check mb-0">
      <input class="form-check-input" type="checkbox" id="exam-source-filter">
      <label class="form-check-label" for="exam-source-filter">Current exam &amp; source</label>
    </div>
  </div>

  <table id="students-table" class="table table-sm table-hover table-striped">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Matricola</th>
        <th class="text-end">Results</th>
        <th>First</th>
        <th>Last</th>
        <th>First eval</th>
      </tr>
    </thead>
  </table>

</div>
{% endblock %}

{% block scripts %}
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.min.js"></script>
<script>
const students = {{ students_json | safe }};
const fmtDate = (d) => d ? `${d.slice(0,2)}-${d.slice(2,4)}-${d.slice(4)}` : '';

const table = new DataTable('#students-table', {
  data: students,
  pageLength: 50,
  order: [[0, 'asc']],
  columns: [
    { data: 'name' },
    { data: 'email',
      render: (d) => `<a href="/history/${d}">${d}</a>` },
    { data: 'matricola' },
    { data: 'n', className: 'text-end' },
    { data: 'first',      render: fmtDate },
    { data: 'last',       render: fmtDate },
    { data: 'first_eval', render: fmtDate },
  ],
});

const examDate = '{{ exam_date }}';

DataTable.ext.search.push((_settings, _data, _idx, row) => {
  const date = document.getElementById('date-filter').value;
  if (date && !row.dates.includes(date)) return false;
  if (document.getElementById('refused-filter').checked && !row.has_refused) return false;
  if (document.getElementById('exam-source-filter').checked) {
    if (!row.dates.includes(examDate) || !row.has_source) return false;
  }
  return true;
});

table.draw();

document.getElementById('date-filter').addEventListener('change', () => table.draw());
document.getElementById('refused-filter').addEventListener('change', () => table.draw());
document.getElementById('exam-source-filter').addEventListener('change', () => table.draw());
</script>
{% endblock %}
