{% extends 'base.html' %}

{% block title %}History — p2e{% endblock %}

{% block head %}
<link href="https://cdn.datatables.net/2.0.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
{% endblock %}

{% block header %}
<select id="date-filter" class="form-select form-select-sm w-auto flex-shrink-0">
  <option value="">All exam dates</option>
  <option value="{{ current_date }}">▶ {{ current_date[:2] }}-{{ current_date[2:4] }}-{{ current_date[4:] }}</option>
  {% for date in exam_dates %}
  <option value="{{ date }}">{{ date[:2] }}-{{ date[2:4] }}-{{ date[4:] }}</option>
  {% endfor %}
</select>
<select id="kind-filter" class="form-select form-select-sm w-auto flex-shrink-0">
  <option value="">All kinds</option>
  <option value="nuovo">Nuovo</option>
  <option value="assente">Assente</option>
  <option value="passato">Passato</option>
  <option value="rifiutato">Rifiutato</option>
  <option value="ritirato">Ritirato</option>
  <option value="respinto">Respinto</option>
</select>
<select id="page-len" class="form-select form-select-sm w-auto flex-shrink-0">
  <option value="25">25</option>
  <option value="50" selected>50</option>
  <option value="100">100</option>
  <option value="-1">All</option>
</select>
<input id="dt-search" type="search" class="form-control form-control-sm flex-grow-1"
       placeholder="Search…" style="min-width:0;">
{% endblock %}

{% block content %}
<div class="container-fluid py-3">
  <table id="students-table" class="table table-sm table-hover table-striped">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Matricola</th>
        <th class="text-end">Results</th>
        <th>First</th>
        <th>Last</th>
        <th>First eval</th>
        <th>Mark</th>
      </tr>
    </thead>
  </table>
</div>
{% endblock %}

{% block scripts %}
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.min.js"></script>
<script>
const CFG = {
  students: {{ students | tojson }},
};
</script>
<script src="{{ url_for('static', filename='common.js') }}"></script>
<script src="{{ url_for('static', filename='history.js') }}"></script>
{% endblock %}
